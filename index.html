<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Switcher</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div id="theme-changer-div">
            <input type="radio" name="theme-changer" id="light-theme" checked>
            <label for="light-theme">Light</label>
            <input type="radio" name="theme-changer" id="dark-theme">
            <label for="dark-theme">Dark</label>
            <input type="radio" name="theme-changer" id="custom-theme">
            <label for="custom-theme">Custom</label>
        </div>
        <h2>Hello, World!</h2>
        <p>Simple card that changes theme</p>
        <button>Click Me!</button>
    </div>
</body>
</html>
